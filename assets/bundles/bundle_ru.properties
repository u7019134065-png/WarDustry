mod.wardustry.displayName = [scarlet]War[white]Dustry
mod.wardustry.description = WarDustry — набор контента о военной технике для Mindustry: барражирующие дроны («Шахед» и дрон-камикадзе), а также разведывательный, бомбардировочный, ракетный, ганшип и дрон-перехватчик, наземная техника (джип и автобус) и заводы дронов и техники, которые их производят. Собран как Java-мод.

unit.wardustry-shahed.name = Шахед
unit.wardustry-shahed.description = Дешёвый быстрый барражирующий боеприпас, пикирующий на цель с тяжёлой боевой частью.
block.wardustry-drone-factory.name = Завод беспилотников
block.wardustry-drone-factory.description = Производит барражирующие дроны «Шахед».
unit.wardustry-kamikaze-drone.name = Дрон-камикадзе
unit.wardustry-kamikaze-drone.description = Маленький дрон-смертник, быстро рвущийся к цели и взрывающийся в упор.
unit.wardustry-recon-drone.name = Разведдрон
unit.wardustry-recon-drone.description = Быстрый безоружный разведчик с большой дальностью обзора и низкой живучестью.
unit.wardustry-bomber-drone.name = Дрон-бомбардировщик
unit.wardustry-bomber-drone.description = Тяжёлый дрон, сбрасывающий мощные бомбы с большой площадью поражения.
unit.wardustry-missile-drone.name = Ракетный дрон
unit.wardustry-missile-drone.description = Средний дрон, вооружённый управляемыми ракетами.
unit.wardustry-gunship-drone.name = Дрон-ганшип
unit.wardustry-gunship-drone.description = Более тяжёлый дрон, подавляющий цель быстрым огнём автопушки.
unit.wardustry-interceptor-drone.name = Дрон-перехватчик
unit.wardustry-interceptor-drone.description = Дрон завоевания воздуха, созданный для перехвата вражеских самолётов.
unit.wardustry-jeep.name = Джип
unit.wardustry-jeep.description = Лёгкая наземная машина с быстрой автопушкой на турели.
unit.wardustry-bus.name = Автобус
unit.wardustry-bus.description = Медленный бронированный транспорт с большим грузовым отсеком.
block.wardustry-vehicle-factory.name = Завод техники
block.wardustry-vehicle-factory.description = Производит джипы и автобусы линии WarDustry.

item.wardustry-uranium.name = Уран
item.wardustry-uranium.description = Плотный радиоактивный металл, используемый как боеприпас для продвинутого оружия.
liquid.wardustry-plasma-energy.name = Плазменная энергия
liquid.wardustry-plasma-energy.description = Яркая голубо-пурпурная энергожидкость, служащая продуктом продвинутого реактора.
status.wardustry-irradiation.name = Облучение
status.wardustry-irradiation.description = Губительное урановое излучение, сильно замедляющее движение.
block.wardustry-plasma-reactor.name = Плазменный реактор
block.wardustry-plasma-reactor.description = Преобразует энергию и очищенные материалы в плазменную энергию.
block.wardustry-ore-uranium.name = Урановая руда
block.wardustry-ore-uranium.description = Радиоактивное месторождение, дающее уран при добыче.
block.wardustry-uranium-launcher.name = Урановый пускатель
block.wardustry-uranium-launcher.description = Стреляет урановыми снарядами, вызывающими облучение.
block.wardustry-tactical-drill.name = Тактический бур
block.wardustry-tactical-drill.description = Компактный бронированный бур для полевой добычи ресурсов.
block.wardustry-tactical-bore.name = Тактическая буровая установка
block.wardustry-tactical-bore.description = Мощная бронированная буровая установка для тяжёлой добычи.
block.wardustry-armored-conveyor.name = Бронированный конвейер
block.wardustry-armored-conveyor.description = Усиленный конвейер, способный выжить на передовой.
block.wardustry-jshon-ban-factory.name = Фабрика Джшон Бана
block.wardustry-jshon-ban-factory.description = Производит босс-юнит Джшон Бан.
unit.wardustry-jshon-ban.name = Джшон Бан
unit.wardustry-jshon-ban.description = Огромный бронированный мех с щитом на 3000 единиц, радиационной аурой и катастрофическими взрывами при смерти.
