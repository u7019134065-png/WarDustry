mod.wardustry.displayName = [scarlet]War[white]Dustry
mod.wardustry.description = WarDustry — це військово-технічний набір контенту для Mindustry: барражувальні дрони (Shahed і дрон-камікадзе), розвіддрони, бомбардувальники, ракетні та ганшип-дрони, дрони-перехоплювачі, наземні машини (джип і автобус), а також заводи дронів і техніки, що їх виробляють. Зібрано як Java-мод.
unit.wardustry-shahed.name = Шахед
unit.wardustry-shahed.description = Дешевий швидкий барражувальний боєприпас, що пікірує на ціль з важкою бойовою частиною.
block.wardustry-drone-factory.name = Завод дронів
block.wardustry-drone-factory.description = Збирає барражувальні дрони Shahed.
unit.wardustry-kamikaze-drone.name = Дрон-камікадзе
unit.wardustry-kamikaze-drone.description = Малий дрон-смертник, що стрімко атакує цілі та вибухає впритул.
unit.wardustry-recon-drone.name = Розвіддрон
unit.wardustry-recon-drone.description = Швидкий беззбройний розвідник із великим радіусом огляду та низькою живучістю.
unit.wardustry-bomber-drone.name = Дрон-бомбардувальник
unit.wardustry-bomber-drone.description = Важкий дрон, що скидає потужні вибухові бомби згори.
unit.wardustry-missile-drone.name = Ракетний дрон
unit.wardustry-missile-drone.description = Дрон середньої швидкості, озброєний керованими ракетами.
unit.wardustry-gunship-drone.name = Дрон-ганшип
unit.wardustry-gunship-drone.description = Важчий дрон, що накриває цілі швидкострільною автопушкою.
unit.wardustry-interceptor-drone.name = Дрон-перехоплювач
unit.wardustry-interceptor-drone.description = Дрон для панування в повітрі, заточений на перехоплення ворожих літаків.
unit.wardustry-jeep.name = Джип
unit.wardustry-jeep.description = Легка hover-машина зі швидкострільною автопушкою.
unit.wardustry-bus.name = Автобус
unit.wardustry-bus.description = Повільний броньований транспорт із дуже великою місткістю вантажу.
block.wardustry-vehicle-factory.name = Завод техніки
block.wardustry-vehicle-factory.description = Збирає джипи та автобуси для наземної лінії WarDustry.
item.wardustry-uranium.name = Уран
item.wardustry-uranium.description = Щільний радіоактивний метал, що використовується як боєприпас для просунутої зброї.
liquid.wardustry-plasma-energy.name = Плазмова енергія
liquid.wardustry-plasma-energy.description = Яскрава бірюзово-пурпурова енергетична рідина для просунутої реакторної лінії.
status.wardustry-irradiation.name = Опромінення
status.wardustry-irradiation.description = Зловісне уранове випромінювання, яке сильно сповільнює рух.
block.wardustry-plasma-reactor.name = Плазмовий реактор
block.wardustry-plasma-reactor.description = Перетворює енергію та очищені матеріали на плазмову рідину.
block.wardustry-ore-uranium.name = Уранова руда
block.wardustry-ore-uranium.description = Радіоактивне рудне покладення, що дає уран під час видобутку.
block.wardustry-uranium-launcher.name = Уранова пускова установка
block.wardustry-uranium-launcher.description = Стріляє урановими снарядами, що опромінюють цілі.
block.wardustry-tactical-drill.name = Тактичний бур
block.wardustry-tactical-drill.description = Компактний броньований бур для польового видобутку ресурсів.
block.wardustry-tactical-bore.name = Тактичний бур II
block.wardustry-tactical-bore.description = Потужний бур з живленням для пріоритетного видобутку.
block.wardustry-jshon-ban-factory.name = Фабрика Джшона Бана
block.wardustry-jshon-ban-factory.description = Виробляє бос-юніт Джшон Бан.
unit.wardustry-jshon-ban.name = Джшон Бан
unit.wardustry-jshon-ban.description = Колосальний броньований мех із щитом на 3000, радіаційною аурою та катастрофічними вибухами смерті.
item.wardustry-steel.name = Сталь
item.wardustry-steel.description = Промислова сталь для броні, конвеєрів і важкого будівництва.
item.wardustry-shell.name = Снаряд
item.wardustry-shell.description = Стандартна гільза та бронебійне ядро артилерійського боєприпасу.
block.wardustry-war-conveyor.name = Військовий конвеєр
block.wardustry-war-conveyor.description = Броньований конвеєр для роботи на ворожій території.
block.wardustry-armored-router.name = Броньований маршрутизатор
block.wardustry-armored-router.description = Посилений маршрутизатор, що тримає потоки предметів під вогнем.
block.wardustry-armored-junction.name = Броньований вузол
block.wardustry-armored-junction.description = Зміцнений перехресток для захищеного руху предметів.
block.wardustry-armored-bridge.name = Броньований міст
block.wardustry-armored-bridge.description = Далекобійний броньований предметний міст для безпечного перетину розривів.
block.wardustry-steel-wall.name = Сталева стіна
block.wardustry-steel-wall.description = Базове сталеве укріплення для передової.
block.wardustry-steel-wall-large.name = Велика сталева стіна
block.wardustry-steel-wall-large.description = Крупніша сталева стіна для широких оборонних ліній.
block.wardustry-reinforced-wall.name = Посилена стіна
block.wardustry-reinforced-wall.description = Товстіша стіна з додатковим каркасом.
block.wardustry-reinforced-wall-large.name = Велика посилена стіна
block.wardustry-reinforced-wall-large.description = Важка посилена стіна для критичних вузьких проходів.
block.wardustry-war-blast-door.name = Військовий вибухостійкий люк
block.wardustry-war-blast-door.description = Важкі двері, що герметизують ключові військові коридори.
block.wardustry-diesel-generator.name = Дизельний генератор
block.wardustry-diesel-generator.description = Спалює паливні предмети для виробництва базової енергії.
block.wardustry-solar-array.name = Сонячний масив
block.wardustry-solar-array.description = Компактне військове сонячне поле для денного живлення.
block.wardustry-large-battery.name = Великий акумулятор
block.wardustry-large-battery.description = Зберігає енергію для тривалої оборони та виробництва.
block.wardustry-plasma-turbine.name = Плазмова турбіна
block.wardustry-plasma-turbine.description = Перетворює плазмову енергію на чисту потужність.
block.wardustry-repair-projector.name = Ремонтний проєктор
block.wardustry-repair-projector.description = Швидко ремонтує найближчі військові споруди.
block.wardustry-war-shield-projector.name = Військовий щитовий проєктор
block.wardustry-war-shield-projector.description = Проєктує захисне силове поле навколо важливих вузлів.
block.wardustry-war-overdrive-projector.name = Військовий проєктор перегрузки
block.wardustry-war-overdrive-projector.description = Прискорює найближчі блоки для вищої продуктивності.
block.wardustry-reinforced-drill.name = Посилений бур
block.wardustry-reinforced-drill.description = Броньований бур для твердіших рудних жил.
block.wardustry-pneumatic-drill-ii.name = Пневматичний бур II
block.wardustry-pneumatic-drill-ii.description = Покращений бур із живленням для швидкого видобутку.
block.wardustry-steel-smelter.name = Плавильня сталі
block.wardustry-steel-smelter.description = Плавить мідь і свинець у промислову сталь.
block.wardustry-munitions-factory.name = Фабрика боєприпасів
block.wardustry-munitions-factory.description = Перетворює сталь і свинець у стандартні снаряди.
block.wardustry-autocannon.name = Автопушка
block.wardustry-autocannon.description = Швидкострільна турель для придушення передової.
block.wardustry-flak-gun.name = Зенітка
block.wardustry-flak-gun.description = ППО-гармата, що засипає небо шрапнеллю.
block.wardustry-railgun.name = Рельсотрон
block.wardustry-railgun.description = Високошвидкісна рейкова зброя для броньованих цілей.
block.wardustry-missile-battery.name = Ракетна батарея
block.wardustry-missile-battery.description = Запускає керовані ракети по ворожих юнітах.
block.wardustry-mortar.name = Міномет
block.wardustry-mortar.description = Турель навісного вогню з вибуховими снарядами.
block.wardustry-tesla-turret.name = Тесла-турель
block.wardustry-tesla-turret.description = Електрична турель, що кидає дуги блискавки між цілями.
block.wardustry-laser-turret.name = Лазерна турель
block.wardustry-laser-turret.description = Безперервна променева турель для точкового ураження.
block.wardustry-plasma-turret.name = Плазмова турель
block.wardustry-plasma-turret.description = Стріляє плазмовими зарядами з жаром плазмової енергії.
unit.wardustry-scout-vehicle.name = Розвідмашина
unit.wardustry-scout-vehicle.description = Швидка броньована машина для розвідки та переслідування.
unit.wardustry-apc.name = БТР
unit.wardustry-apc.description = Бронетранспортер із легкою туреллю.
unit.wardustry-artillery-vehicle.name = Артилерійська машина
unit.wardustry-artillery-vehicle.description = Самохідна артилерійська машина підтримки.
unit.wardustry-mbt.name = Основний бойовий танк
unit.wardustry-mbt.description = Важкий hover-танк для прориву оборони.
unit.wardustry-heavy-gunship.name = Важкий ганшип
unit.wardustry-heavy-gunship.description = Міцний повітряний ганшип із безперервним вогнем автопушки.
unit.wardustry-emp-drone.name = ЕМП-дрон
unit.wardustry-emp-drone.description = Підтримувальний дрон, що шокує цілі та зриває наступ.
