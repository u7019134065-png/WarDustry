mod.wardustry.displayName = [scarlet]War[white]Dustry
mod.wardustry.description = WarDustry is a military-tech content pack for Mindustry: loitering drones (Shahed and a kamikaze drone), plus recon, bomber, missile, gunship and interceptor drones, ground vehicles (jeep and bus), and the drone and vehicle factories that build them. Built as a Java mod.

unit.wardustry-shahed.name = Shahed
unit.wardustry-shahed.description = A cheap, fast loitering-munition drone that dives into targets with a heavy warhead.
block.wardustry-drone-factory.name = Drone Factory
block.wardustry-drone-factory.description = Assembles Shahed loitering drones.
unit.wardustry-kamikaze-drone.name = Kamikaze Drone
unit.wardustry-kamikaze-drone.description = A tiny suicide drone that rushes targets and explodes at point-blank range.
unit.wardustry-recon-drone.name = Recon Drone
unit.wardustry-recon-drone.description = A fast unarmed scout with long vision and low survivability.
