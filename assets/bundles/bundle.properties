mod.wardustry.displayName = [scarlet]War[white]Dustry
mod.wardustry.description = WarDustry is a military-tech content pack for Mindustry: loitering drones (Shahed and a kamikaze drone), plus recon, bomber, missile, gunship and interceptor drones, ground vehicles (jeep and bus), and the drone and vehicle factories that build them. Built as a Java mod.

unit.wardustry-shahed.name = Shahed
unit.wardustry-shahed.description = A cheap, fast loitering-munition drone that dives into targets with a heavy warhead.
block.wardustry-drone-factory.name = Drone Factory
block.wardustry-drone-factory.description = Assembles Shahed loitering drones.
unit.wardustry-kamikaze-drone.name = Kamikaze Drone
unit.wardustry-kamikaze-drone.description = A tiny suicide drone that rushes targets and explodes at point-blank range.
unit.wardustry-recon-drone.name = Recon Drone
unit.wardustry-recon-drone.description = A fast unarmed scout with long vision and low survivability.
unit.wardustry-bomber-drone.name = Bomber Drone
unit.wardustry-bomber-drone.description = A heavy drone that drops powerful splash bombs from above.
unit.wardustry-missile-drone.name = Missile Drone
unit.wardustry-missile-drone.description = A mid-speed drone armed with guided missiles.
unit.wardustry-gunship-drone.name = Gunship Drone
unit.wardustry-gunship-drone.description = A heavier drone that hammers targets with rapid autocannon fire.
unit.wardustry-interceptor-drone.name = Interceptor Drone
unit.wardustry-interceptor-drone.description = An air superiority drone tuned to intercept enemy aircraft.
unit.wardustry-jeep.name = Jeep
unit.wardustry-jeep.description = A light hover vehicle with a fast-mounted autocannon.
unit.wardustry-bus.name = Bus
unit.wardustry-bus.description = A slow armored transport with a very large cargo capacity.
block.wardustry-vehicle-factory.name = Vehicle Factory
block.wardustry-vehicle-factory.description = Assembles Jeeps and Buses for the WarDustry ground line.

item.wardustry-uranium.name = Uranium
item.wardustry-uranium.description = A dense radioactive metal used as ammunition for advanced weapons.
liquid.wardustry-plasma-energy.name = Plasma Energy
liquid.wardustry-plasma-energy.description = A bright cyan-magenta energy fluid used as an advanced reactor output.
status.wardustry-irradiation.name = Irradiation
status.wardustry-irradiation.description = Sickly uranium radiation that heavily slows movement.
block.wardustry-plasma-reactor.name = Plasma Reactor
block.wardustry-plasma-reactor.description = Converts power and refined materials into plasma energy.
block.wardustry-ore-uranium.name = Uranium Ore
block.wardustry-ore-uranium.description = A radioactive ore deposit that yields uranium when mined.
block.wardustry-uranium-launcher.name = Uranium Launcher
block.wardustry-uranium-launcher.description = Fires uranium rounds that irradiate targets.
block.wardustry-tactical-drill.name = Tactical Drill
block.wardustry-tactical-drill.description = A compact armored drill for field resource extraction.
block.wardustry-tactical-bore.name = Tactical Bore
block.wardustry-tactical-bore.description = A powered heavy drill for high-priority mining operations.
block.wardustry-armored-conveyor.name = Armored Conveyor
block.wardustry-armored-conveyor.description = A reinforced conveyor built to survive the front line.
block.wardustry-jshon-ban-factory.name = Jshon Ban Factory
block.wardustry-jshon-ban-factory.description = Produces the Jshon Ban boss unit.
unit.wardustry-jshon-ban.name = Jshon Ban
unit.wardustry-jshon-ban.description = A colossal armored mech with a 3000-point shield, a radiation aura, and catastrophic death blasts.
